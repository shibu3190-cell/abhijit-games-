<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>P2P Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
</head>
<body>
    <div id="disconnectOverlay">
        <div class="spinner"></div>
        <h2 style="margin: 0;">Connection Lost</h2>
        <p style="color: #aaa;">Attempting to reconnect...</p>
    </div>

    <div class="top-bar">
        <h1>🎮 Game Hub</h1>
        <button class="menu-btn" id="navMenuBtn" onclick="toggleMenu()" style="display: none;">☰</button>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <button class="btn" onclick="switchGame('ludo'); toggleMenu()">🎲 Ludo Pro</button>
        <button class="btn" onclick="switchGame('snakes'); toggleMenu()">🐍 Snakes & Ladders</button>
        <button class="btn" onclick="switchGame('ttt'); toggleMenu()">❌ Tic-Tac-Toe</button>
        <button class="btn" style="background: var(--host-color); margin-top: 30px;" onclick="resetCurrentGame(); toggleMenu()">🔄 Reset Game</button>
        <button class="btn" style="background: #5f6368;" onclick="location.reload()">🔌 Disconnect</button>
    </div>

    <div class="panel" id="setupPanel">
        <h2 style="margin-top:0;">Network Setup</h2>
        <input type="text" id="playerName" placeholder="Your Name" maxlength="12">
        <button class="btn btn-host" onclick="hostGame()" style="width: 100%;">Host Game</button>
        <p id="myIdDisplay" style="color: #34a853; font-weight: 900; font-size: 24px; margin: 15px 0; letter-spacing: 2px;"></p>
        <hr style="border-color: #3c4043; margin: 15px 0;">
        <input type="text" id="joinId" placeholder="Friend's ID Code" style="text-transform: uppercase;">
        <button class="btn" onclick="joinGame()" style="width: 100%;">Join Game</button>
    </div>

    <div id="gameContainer">
        <div id="ttt" class="game-section">
            <div class="ttt-board" id="tttBoard"></div>
        </div>
        <div id="snakes" class="game-section">
            <div class="snakes-board" id="snakesBoard"><svg id="snakesSvg"></svg></div>
        </div>
        <div id="ludo" class="game-section active-game">
            <canvas id="ludoCanvas"></canvas>
        </div>
    </div>

    <div class="control-panel" id="controlDock" style="display: none;">
        <div class="player-zone">
            <div class="player-name" style="color: var(--host-color);" id="p1Name">Host 🔴</div>
            <div class="dice" id="diceHost" onclick="requestUniversalRoll('Host')"></div>
        </div>
        <div class="status-text" id="gameStatus">Waiting...</div>
        <div class="player-zone">
            <div class="player-name" style="color: var(--guest-color);" id="p2Name">Guest 🟡</div>
            <div class="dice" id="diceGuest" onclick="requestUniversalRoll('Guest')"></div>
        </div>
    </div>

    <div id="chatToggleBtn" onclick="toggleChat()">💬<div id="chatBadge" class="chat-badge">!</div></div>
    <div id="chatPanel">
        <div class="chat-header"><span>Live Chat</span><span class="close-chat" onclick="toggleChat()">✖</span></div>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Message..." onkeypress="handleChatKeyPress(event)">
            <button class="btn" onclick="sendChat()" style="padding: 8px 15px;">Send</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
